<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ══════════ SEO: Título y Meta Description ══════════ -->
  <title>Blue Automations | Agentes de IA y Automatización Inteligente</title>
  <meta name="description"
    content="Blue Automations: Agencia especializada en la implementación de Agentes de IA y sistemas de automatización. Agentes de WhatsApp 24/7 y automatización omnicanal." />
  <meta name="keywords"
    content="automatización, inteligencia artificial, agentes IA, chatbot WhatsApp, Blue Automations, automatización ventas, IA para negocios, atención al cliente IA" />
  <meta name="author" content="Blue Automations" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.blueautomation.com/" />

  <!-- ══════════ SEO: Open Graph (Facebook, LinkedIn, WhatsApp) ══════════ -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Blue Automations" />
  <meta property="og:url" content="https://www.blueautomation.com/" />
  <meta property="og:title" content="Blue Automations | Specialized Agency in AI Agents & Automation" />
  <meta property="og:description"
    content="Aseguramos que tu negocio esté abierto 24/7. Centralizamos y automatizamos tus respuestas en WhatsApp, Facebook Messenger e Instagram." />
  <meta property="og:locale" content="es_AR" />

  <!-- ══════════ SEO: Twitter/X ══════════ -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Blue Automations | IA y Automatización" />
  <meta name="twitter:description"
    content="Agentes de inteligencia artificial que transforman la experiencia de tus clientes. Automatización inteligente." />

  <!-- ══════════ SEO: JSON-LD Structured Data ══════════ -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Blue Automations",
      "url": "https://www.blueautomation.com",
      "description": "Agencia de automatización con inteligencia artificial especializada en hoteles y posadas. Ofrecemos agentes de WhatsApp, recepcionistas telefónicos IA, automatización de check-in con OCR y concierge virtual RAG.",
      "areaServed": "AR",
      "serviceType": ["Automatización con IA", "Chatbots para hoteles", "Agentes de voz IA", "OCR para check-in", "Concierge virtual RAG"],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+54-11-6887-3648",
        "contactType": "sales",
        "areaServed": "AR",
        "availableLanguage": "Spanish"
      }
    }
    </script>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Blue Automations",
      "url": "https://www.blueautomation.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.blueautomation.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Automatización con Inteligencia Artificial para Hoteles",
      "provider": {
        "@type": "Organization",
        "name": "Blue Automations"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Argentina"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Servicios de IA para Hoteles",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Agente de WhatsApp para Hoteles",
              "description": "Atención al huésped 24/7 por WhatsApp con inteligencia artificial: reservas, consultas y ventas automatizadas."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Recepcionista Telefónico IA",
              "description": "Sistema de voz inteligente que atiende llamadas del hotel, responde preguntas frecuentes y deriva urgencias."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Automatización de Check-in con OCR",
              "description": "Digitalización de DNI y pasaportes para check-in automático y procesamiento de facturas de proveedores."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Concierge Virtual RAG",
              "description": "Asistente inteligente entrenado con la documentación del hotel: menús, horarios, guías turísticas y políticas."
            }
          }
        ]
      }
    }
    </script>

  <!-- ══════════ Fuente Inter (Google Fonts) ══════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- ══════════ Theme Color ══════════ -->
  <meta name="theme-color" content="#0B0F19" />
  <meta name="apple-mobile-web-app-title" content="Blue Automations" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
